<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <meta
        name="theme-color"
        content="#000000">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black">

    <meta
        name="mobile-web-app-capable"
        content="yes">

    <meta
        name="format-detection"
        content="telephone=no">

    <title>⚠ Alerte</title>

    <link
        rel="icon"
        href="affiche.png">

    <link
        rel="preload"
        href="affiche.png"
        as="image">

    <link
        rel="preload"
        href="musique.wav"
        as="audio">

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- Fond noir -->
    <!-- ========================= -->

    <div id="background"></div>

    <!-- ========================= -->
    <!-- Flash rouge -->
    <!-- ========================= -->

    <div id="flash"></div>

    <!-- ========================= -->
    <!-- Affiche -->
    <!-- ========================= -->

    <div id="posterContainer">

        <img
            id="poster"
            src="affiche.png"
            alt="Affiche">

    </div>

    <!-- ========================= -->
    <!-- Écran d'accueil -->
    <!-- ========================= -->

    <div id="intro">

        <div id="introBox">

            <div id="warning">

                ⚠

            </div>

            <h1>

                ALERTE

            </h1>

            <p>

                Touchez l'écran

            </p>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Audio -->
    <!-- ========================= -->

    <audio
        id="audio"
        preload="auto"
        playsinline
        loop>

        <source
            src="musique.wav"
            type="audio/wav">

    </audio>

    <!-- ========================= -->
    <!-- Préchargement -->
    <!-- ========================= -->

    <div id="loader">

        Chargement...

    </div>

    <!-- ========================= -->
    <!-- Script -->
    <!-- ========================= -->

    <script src="script.js"></script>

</body>

</html>
